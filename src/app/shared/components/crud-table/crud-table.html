<div class="card shadow-sm">

    <div class="card-body p-0">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th *ngFor="let col of columns" [class.d-none]="col.hidden">
                            {{ col.label }}
                        </th>
                        <th style="width:120px">Actions</th>
                    </tr>
                </thead>

                <tbody>

                    <tr *ngIf="data.length === 0">
                        <td colspan="100%" class="text-center py-4 text-muted">
                            No data found
                        </td>
                    </tr>

                    <tr *ngFor="let item of data; let i = index">

                        <td>{{ i + 1 }}</td>

                        <td *ngFor="let col of columns" [class.d-none]="col.hidden">

                            <ng-container [ngSwitch]="col.type">

                                <!-- STATUS -->
                                <span *ngSwitchCase="'badge'">
                                    <span class="badge bg-success" *ngIf="item[col.field]">Active</span>
                                    <span class="badge bg-danger" *ngIf="!item[col.field]">Inactive</span>
                                </span>

                                <!-- ICON -->
                                <i *ngSwitchCase="'icon'" [class]="item[col.field]"></i>

                                <!-- DEFAULT -->
                                <span *ngSwitchDefault>
                                    {{ item[col.field] || '-' }}
                                </span>

                            </ng-container>

                        </td>

                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-warning" (click)="edit.emit(item)">
                                    <i class="fas fa-edit"></i>
                                </button>

                                <button class="btn btn-danger" (click)="remove.emit(item.id)">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
