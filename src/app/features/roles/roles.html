<div class="container-fluid">

    <!-- HEADER -->
    <div class="d-flex justify-content-between mb-3">
        <h3>{{ config.title }}</h3>
        <button class="btn btn-primary" (click)="openCreate()">New</button>
    </div>

    <!-- TABS -->
    <ul class="nav nav-pills mb-3">
        <li class="nav-item me-2">
            <a class="nav-link" [class.active]="activeTab==='active'" (click)="changeTab('active')">Active</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" [class.active]="activeTab==='inactive'" (click)="changeTab('inactive')">Inactive</a>
        </li>
    </ul>

    <!-- TABLE -->
    <app-crud-table [data]="paginatedData" [columns]="config.columns" (edit)="openEdit($event)"
        (remove)="delete($event)">
    </app-crud-table>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-between mt-3">

        <small>
            Showing {{ (page - 1) * pageSize + 1 }}
            to {{ page * pageSize }}
            of {{ filteredData.length }}
        </small>

        <ul class="pagination pagination-sm">

            <li class="page-item" [class.disabled]="page===1">
                <a class="page-link" (click)="prevPage()">«</a>
            </li>

            <li class="page-item" *ngFor="let p of totalPagesArray" [class.active]="p===page">
                <a class="page-link" (click)="goToPage(p)">{{ p }}</a>
            </li>

            <li class="page-item" [class.disabled]="page===totalPages">
                <a class="page-link" (click)="nextPage()">»</a>
            </li>

        </ul>

    </div>

    <!-- MODAL -->
    <app-crud-modal [show]="showModal" [form]="form" [fields]="config.formFields" [isEditMode]="isEditMode"
        (close)="closeModal()" (save)="save()">
    </app-crud-modal>

</div>
