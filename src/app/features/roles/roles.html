<div class="card">

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->
    <div class="card-header">
        <h1 class="card-title"><b>Roles</b></h1>

        <div class="card-tools">
            <button *ngIf="can('create')" class="btn btn-primary btn-sm" (click)="openCreate()">
                <i class="fas fa-plus"></i> New
            </button>
        </div>
    </div>

    <!-- ========================= -->
    <!-- BODY -->
    <!-- ========================= -->
    <div class="card-body">

        <!-- Tabs -->
        <ul class="nav nav-pills mb-3">
            <li class="nav-item">
                <a class="nav-link" [class.active]="activeTab === 'active'" (click)="changeTab('active')">
                    Active
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" [class.active]="activeTab === 'inactive'" (click)="changeTab('inactive')">
                    Inactive
                </a>
            </li>
        </ul>

        <!-- ========================= -->
        <!-- DATA TABLE -->
        <!-- ========================= -->
        <app-data-table [columns]="columns" [data]="paginated" [emptyText]="'No roles found'"
            (action)="handleAction($event)">
        </app-data-table>

        <!-- ========================= -->
        <!-- PAGINATION -->
        <!-- ========================= -->
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">

            <!-- Info -->
            <div>
                Showing
                {{ filtered.length ? (page - 1) * pageSize + 1 : 0 }}
                to
                {{ page * pageSize > filtered.length ? filtered.length : page * pageSize }}
                of
                {{ filtered.length }}
                entries
            </div>

            <!-- Controls -->
            <ul class="pagination pagination-sm m-0">

                <li class="page-item" [class.disabled]="page === 1">
                    <a class="page-link" (click)="prevPage()">«</a>
                </li>

                <li class="page-item" *ngFor="let p of totalPagesArray" [class.active]="p === page">
                    <a class="page-link" (click)="goToPage(p)">
                        {{ p }}
                    </a>
                </li>

                <li class="page-item" [class.disabled]="page === totalPages">
                    <a class="page-link" (click)="nextPage()">»</a>
                </li>

            </ul>
        </div>

    </div>
</div>

<!-- ========================= -->
<!-- REUSABLE MODAL -->
<!-- ========================= -->
<app-form-modal [title]="mode === 'edit' ? 'Edit Role' : (mode === 'view' ? 'View Role' : 'Create Role')" [form]="form"
    [mode]="mode" [visible]="modalVisible" [canSave]="canSave()" (save)="save()" (close)="closeModal()">

    <form [formGroup]="form">

        <div class="mb-3">
            <label class="form-label">Role Name</label>
            <input class="form-control" formControlName="role_name" [readonly]="mode === 'view'">

            <div class="text-danger" *ngIf="form.controls['role_name'].touched && form.controls['role_name'].invalid">
                Role name is required
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" formControlName="description" [readonly]="mode === 'view'">
      </textarea>
        </div>

        <div class="form-check">
            <input type="checkbox" class="form-check-input" formControlName="status" [disabled]="mode === 'view'">
            <label class="form-check-label">Active</label>
        </div>
    </form>
</app-form-modal>
