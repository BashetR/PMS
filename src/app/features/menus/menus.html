<div class="card">

    <!-- ================= HEADER ================= -->
    <div class="card-header">
        <h1 class="card-title"><b>Menus</b></h1>

        <div class="card-tools">
            <button *ngIf="can('create')" class="btn btn-primary btn-sm" (click)="openCreate()">
                <i class="fas fa-plus"></i> New
            </button>
        </div>
    </div>

    <!-- ================= BODY ================= -->
    <div class="card-body">

        <!-- Tabs -->
        <ul class="nav nav-pills mb-3">
            <li class="nav-item">
                <a class="nav-link" [class.active]="activeTab === 'active'" (click)="changeTab('active')">Active</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" [class.active]="activeTab === 'inactive'"
                    (click)="changeTab('inactive')">Inactive</a>
            </li>
        </ul>

        <!-- ================= DATA TABLE ================= -->
        <app-data-table [columns]="columns" [data]="paginatedMenus" [emptyText]="'No menus found'"
            (action)="handleAction($event)">
        </app-data-table>

        <!-- ================= PAGINATION ================= -->
        <div class="d-flex justify-content-between mt-3">

            <div>
                Showing {{ (page - 1) * pageSize + 1 }}
                to {{ page * pageSize > filteredMenus.length ? filteredMenus.length : page * pageSize }}
                of {{ filteredMenus.length }}
            </div>

            <div>
                <button class="btn btn-sm btn-secondary me-2" (click)="prevPage()" [disabled]="page === 1">
                    Prev
                </button>

                <button class="btn btn-sm btn-secondary" (click)="nextPage()"
                    [disabled]="page * pageSize >= filteredMenus.length">
                    Next
                </button>
            </div>

        </div>

    </div>
</div>


<!-- ================= FORM MODAL ================= -->
<app-form-modal [visible]="isModalOpen" [title]="mode === 'edit' ? 'Edit Menu' : mode === 'view' ? 'View Menu' : 'Create Menu'"
    [form]="form" [mode]="mode" [canSave]="canSave()" (save)="save()" (close)="isModalOpen = false">

    <form [formGroup]="form">

        <div class="row">

            <!-- NAME -->
            <div class="col-md-6 mb-2">
                <label>Name</label>
                <input class="form-control" formControlName="menu_name">
            </div>

            <!-- SLUG -->
            <div class="col-md-6 mb-2">
                <label>Slug</label>
                <input class="form-control" formControlName="slug">
            </div>

            <!-- ICON -->
            <div class="col-md-6 mb-2">
                <label>Icon</label>
                <input class="form-control" formControlName="icon">
            </div>

            <!-- ROUTE -->
            <div class="col-md-6 mb-2">
                <label>Route</label>
                <input class="form-control" formControlName="route">
            </div>

            <!-- TYPE -->
            <div class="col-md-6 mb-2">
                <label>Menu Type</label>
                <select class="form-control" formControlName="menu_type">
                    <option value="menu">Menu</option>
                    <option value="sub-menu">Sub Menu</option>
                </select>
            </div>

            <!-- PARENT -->
            <div class="col-md-6 mb-2" *ngIf="form.get('menu_type')?.value === 'sub-menu'">
                <label>Parent</label>
                <select class="form-control" formControlName="parent_id">
                    <option [ngValue]="null">Select</option>
                    <option *ngFor="let m of mainMenus" [ngValue]="m.id">
                        {{ m.menu_name }}
                    </option>
                </select>
            </div>

            <!-- ORDER -->
            <div class="col-md-6 mb-2">
                <label>Order</label>
                <input type="number" class="form-control" formControlName="order_no">
            </div>

            <!-- STATUS -->
            <div class="col-12">
                <div class="form-check">
                    <input type="checkbox" formControlName="status">
                    <label>Active</label>
                </div>
            </div>
        </div>
    </form>
</app-form-modal>
