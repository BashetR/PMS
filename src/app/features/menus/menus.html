<div class="container-fluid">

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3 class="fw-bold mb-0">{{ config.title }}</h3>

        <button class="btn btn-primary" (click)="openCreate()">
            <i class="fas fa-plus me-1"></i> New Menu
        </button>

    </div>

    <!-- ================= TABS ================= -->
    <ul class="nav nav-pills mb-3">

        <li class="nav-item me-2">
            <a class="nav-link" [class.active]="activeTab === 'active'" (click)="changeTab('active')">
                Active
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" [class.active]="activeTab === 'inactive'" (click)="changeTab('inactive')">
                Inactive
            </a>
        </li>

    </ul>

    <!-- ================= TABLE (REUSABLE COMPONENT) ================= -->
    <app-crud-table [data]="paginatedData" [columns]="config.columns" (edit)="openEdit($event)"
        (remove)="delete($event)">
    </app-crud-table>

    <!-- ================= PAGINATION ================= -->
    <div class="d-flex justify-content-between align-items-center mt-3">

        <small>
            Showing {{ (page - 1) * pageSize + 1 }}
            to {{ page * pageSize > filteredData.length ? filteredData.length : page * pageSize }}
            of {{ filteredData.length }}
        </small>

        <ul class="pagination pagination-sm m-0">

            <li class="page-item" [class.disabled]="page === 1">
                <a class="page-link" (click)="prevPage()">«</a>
            </li>

            <li class="page-item" *ngFor="let p of totalPagesArray" [class.active]="p === page">

                <a class="page-link" (click)="goToPage(p)">
                    {{ p }}
                </a>

            </li>

            <li class="page-item" [class.disabled]="page === totalPages">
                <a class="page-link" (click)="nextPage()">»</a>
            </li>

        </ul>

    </div>

    <!-- ================= MODAL (REUSABLE + CUSTOM SLOT) ================= -->
    <app-crud-modal [show]="showModal" [form]="form" [fields]="config.formFields" [isEditMode]="isEditMode"
        [isViewMode]="isViewMode" title="Menu Management" (close)="closeModal()" (save)="save()">

        <!-- ================= CUSTOM PERMISSIONS UI ================= -->
        <ng-template #customTemplate>

            <div class="col-12 mb-3">

                <label><b>Permissions</b></label>

                <!-- SELECTED PERMISSIONS -->
                <div class="d-flex flex-wrap gap-2 mb-2">

                    <ng-container *ngFor="let p of permissionList">

                        <span class="badge bg-primary d-flex align-items-center"
                            *ngIf="(form.value.permission_list || []).includes(p.id)">

                            {{ p.name }}

                            <span class="ms-2" style="cursor:pointer" (click)="removePermission(p.id)">
                                ✕
                            </span>

                        </span>

                    </ng-container>

                </div>

                <!-- DROPDOWN BUTTON -->
                <button type="button" class="form-control text-start" (click)="togglePermissionDropdown()"
                    [disabled]="isViewMode">

                    Select Permissions ▼

                </button>

                <!-- DROPDOWN LIST -->
                <div *ngIf="permissionDropdownOpen" class="border p-2 bg-white position-absolute w-100 shadow"
                    style="z-index: 999; max-height: 250px; overflow: auto;">

                    <div *ngFor="let p of filteredPermissionList" class="form-check mb-1">

                        <input type="checkbox" class="form-check-input"
                            [checked]="(form.value.permission_list || []).includes(p.id)"
                            (change)="togglePermission(p.id, $event)">

                        <label class="form-check-label">
                            {{ p.name }}
                        </label>

                    </div>

                </div>

            </div>

        </ng-template>

    </app-crud-modal>

</div>
