<!-- TOP BAR -->
<div class="topbar">

    <div class="left">
        <h3>Admin Dashboard</h3>
    </div>

    <div class="right">

        <!-- PROFILE -->
        <div class="profile" (click)="toggleProfile()">

            <div class="avatar">
                {{ profile?.full_name?.charAt(0) || 'U' }}
            </div>

            <span>
                {{ profile?.full_name || user?.email }}
            </span>

        </div>

        <!-- DROPDOWN -->
        <div class="dropdown" *ngIf="showProfileMenu">

            <p><b>Name:</b> {{ profile?.full_name }}</p>
            <p><b>Email:</b> {{ user?.email }}</p>

            <hr>

            <button class="btn btn-primary" (click)="goToProfile()">
                Profile
            </button>

            <button class="btn btn-danger" (click)="logout()">
                Logout
            </button>

        </div>

    </div>

</div>

<!-- CONTENT -->
<div class="content">
    <h2>Welcome 👋</h2>
</div>
