<div class="card">

    <!-- HEADER -->
    <div class="card-header">
        <h1 class="card-title"><b>Users</b></h1>

        <div class="card-tools">
            <button *ngIf="can('create')" class="btn btn-primary btn-sm" (click)="openCreate()">
                <i class="fas fa-plus"></i> New
            </button>
        </div>
    </div>

    <!-- BODY -->
    <div class="card-body">

        <!-- Tabs -->
        <ul class="nav nav-pills mb-3">
            <li class="nav-item">
                <a class="nav-link" [class.active]="activeTab==='active'" (click)="changeTab('active')">Active</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" [class.active]="activeTab==='inactive'" (click)="changeTab('inactive')">Inactive</a>
            </li>
        </ul>

        <!-- TABLE -->
        <app-data-table [columns]="columns" [data]="paginated" (action)="handleAction($event)">
        </app-data-table>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-between mt-3">
            <div>
                Showing {{ filtered.length ? (page - 1) * pageSize + 1 : 0 }}
                to {{ page * pageSize > filtered.length ? filtered.length : page * pageSize }}
                of {{ filtered.length }}
            </div>

            <ul class="pagination pagination-sm m-0">
                <li class="page-item" [class.disabled]="page === 1">
                    <a class="page-link" (click)="page = page - 1">«</a>
                </li>

                <li class="page-item" *ngFor="let p of totalPagesArray" [class.active]="p === page">
                    <a class="page-link" (click)="page = p">{{ p }}</a>
                </li>

                <li class="page-item" [class.disabled]="page === totalPages">
                    <a class="page-link" (click)="page = page + 1">»</a>
                </li>
            </ul>
        </div>

    </div>
</div>

<!-- MODAL -->
<app-form-modal [title]="mode==='edit' ? 'Edit User' : (mode==='view' ? 'View User' : 'Create User')" [form]="form"
    [mode]="mode" [visible]="modalVisible" [canSave]="canSave()" (save)="save()" (close)="closeModal()">

    <form [formGroup]="form">

        <div class="mb-3">
            <label>Name</label>
            <input class="form-control" formControlName="full_name" [readonly]="mode==='view'">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input class="form-control" formControlName="email" [readonly]="mode==='view'">
        </div>

        <div class="mb-3">
            <label>Role</label>
            <select class="form-control" formControlName="role_id" [disabled]="mode==='view'">
                <option [ngValue]="null">Select Role</option>
                <option *ngFor="let r of roles" [ngValue]="r.id">
                    {{ r.role_name }}
                </option>
            </select>
        </div>

        <div class="form-check">
            <input type="checkbox" class="form-check-input" formControlName="is_active" [disabled]="mode==='view'">
            <label class="form-check-label">Active</label>
        </div>
    </form>
</app-form-modal>
