<div class="card">
    <div class="card-header">
        <h1 class="card-title"><b>Users</b></h1>

        <div class="card-tools">
            <button class="btn btn-primary btn-sm" (click)="openCreateModal()">
                <i class="fas fa-plus"></i> New
            </button>
        </div>
    </div>

    <div class="card-body">
        <!-- TABLE -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let user of users">
                        <td>{{ user.full_name }}</td>
                        <td>{{ user.email }}</td>
                        <td>{{ user.role }}</td>
                        <td>{{ user.is_active ? 'Active' : 'Inactive' }}</td>
                        <td class="d-flex gap-1">
                            <button class="btn btn-warning btn-sm" (click)="openEditModal(user)">Edit</button>
                            <button class="btn btn-info btn-sm" (click)="openViewModal(user)">View</button>
                            <button class="btn btn-danger btn-sm" (click)="deleteUser(user.id)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="showModal">
    <div class="modal-box">
        <h3>{{ isViewMode ? 'View' : isEditMode ? 'Edit' : 'Create' }} User</h3>

        <form [formGroup]="form">
            <input class="form-control mb-2" placeholder="Full Name" formControlName="full_name">
            <input class="form-control mb-2" placeholder="Email" formControlName="email">
            <select class="form-control mb-2" formControlName="role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <label>
                <input type="checkbox" formControlName="is_active">
                Active
            </label>
        </form>

        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-success" *ngIf="!isViewMode" (click)="saveUser()">Save</button>
            <button class="btn btn-secondary" (click)="closeModal()">Close</button>
        </div>
    </div>
</div>
