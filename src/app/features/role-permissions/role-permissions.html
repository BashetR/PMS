<div class="card">
    <div class="card-header">
        <h1 class="card-title"><b>Assign Permissions to Role</b></h1>
    </div>

    <div class="card-body">

        <!-- Role Dropdown -->
        <div class="form-group mb-3">
            <label>Select Role</label>
            <select class="form-control" [(ngModel)]="selectedRole" (change)="onRoleChange()">
                <option value="">-- Select Role --</option>
                <option *ngFor="let r of roles" [value]="r.id">
                    {{ r.name }}
                </option>
            </select>
        </div>

        <!-- Permissions List -->
        <div class="row">
            <div class="col-md-4" *ngFor="let p of permissions">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" [checked]="assignedPermissions.includes(p.id)"
                        (change)="togglePermission(p.id)">
                    <label class="form-check-label">
                        {{ p.name }}
                    </label>
                </div>
            </div>
        </div>

    </div>

    <div class="card-footer text-end">
        <button class="btn btn-primary" (click)="save()" [disabled]="loading">
            Save
        </button>
    </div>
</div>
